<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>46009361 OS</title>
        <meta name="description" content="My take on an OS" />
        <link rel="stylesheet" href="style.css" />
        <script src="main.js" async defer></script>
    </head>
    <body>
        <header>
            <nav>
                <time id="os-time">Loading…</time>
            </nav>
        </header>
        <main>
            <section id="wlc-scrn">
                <h1>Welcome to 46009361 OS</h1>
                <button id="start-btn">Start</button>
            </section>
            <section id="main-os">
                <template id="icon"><div class="icon"><img src="{{icon}}" width="20" height="20"><div>{{title}}</div></div></template>
                <template id="window">
                    <article class="window">
                        <div class="toolbar">{{title}}</div>
                        <iframe class="frame" src="{{source}}"></iframe>
                    </article>
                </template>
            </section>
        </main>
        <footer>
            <img src="neocities.png" alt="Hosted by Neocities" width="100" height="29.5">
        </footer>
    </body>
</html>
